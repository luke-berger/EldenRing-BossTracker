<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EldenCards</title>

    <!-- Tailwind CSS -->
    <link href="../EldenCSS/tailwind.css" rel="stylesheet" />
    <link href="../EldenCSS/eldenStylesMain.css" rel="stylesheet" />

    <!-- Icon -->
    <link
      rel="icon"
      type="image/png"
      href="../EldenPictures/GoldenOrderIcon.png"
    />
  </head>
  <body>
    <!-- Hauptcontainer -->
    <main id="eldenringCards-bg" class="h-screen bg-cover bg-center text-white">
      <!-- Grid-Layout -->
      <main id="CardsMainGrid" class="grid grid-rows-[auto_1fr] h-full">
        <!-- Header -->
        <div id="Header" class="bg-zinc-800">
          <div id="headerImg1" class="w-7">
            <a href="./EldenCards.html">
              <img src="../EldenPictures/Icons/MenuBars.png" alt="Menu-Bars" />
            </a>
          </div>

          <div id="headerImg2" class="w-64">
            <img src="../EldenPictures/Icons/search bar.png" alt="Search-Bar" />
          </div>

          <a href="../../index.html">
            <button id="navButtons">Welcome</button>
          </a>

          <a href="../EldenSites/EldenCards.html">
            <button id="navButtonsPoint">BossTracker</button>
          </a>

          <a href="../EldenSites/EldenWiki.html">
            <button id="navButtons">EldenWiki</button>
          </a>

          <a href="./Developer.html">
            <button id="navButtons">Developers</button>
          </a>

          <div class="flex items-center ml-auto gap-4">
            <div id="headerImg3" class="w-7 ml-auto">
              <a href="./EldenCards.html">
                <img
                  src="../EldenPictures/Icons/optionDots.png"
                  alt="Option Dots"
                />
              </a>
            </div>

            <div id="headerImg4" class="w-7 ml-auto">
              <a href="./EldenCards.html">
                <img
                  src="../EldenPictures/Icons/accountIcon.png"
                  alt="Account-Icon"
                />
              </a>
            </div>
          </div>
        </div>

        <!-- Main Content -->
        <main id="Main" class="flex flex-col">
          <div class="text-white font-bold text-2xl">
            <p class="pb-2">BOSS TRACKER</p>
            <div class="w-full">
              <img src="../EldenPictures/line.png" alt="Line" />
            </div>
          </div>

          <div id="mainFlexCards" class="flex flex-col items-center">
            <div id="PB-ImgContainer" class="flex items-center pt-8 pb-3 w-1/3">
              <img
                src="../EldenPictures/Icons/fakeP-Bar.webp"
                alt="Progress-Bar"
                class="rounded-full"
              />
              <div class="p-2 font-bold text-zinc-300">15%</div>
            </div>
            <div
              id="filterContainer"
              class="flex flex-row gap-5 justify-center items-center"
            >
              <div>Filters:</div>

              <div>
                <input
                  type="checkbox"
                  id="filterCheck1"
                  class="filterBox"
                  value="Killed"
                />
                <label for="filterCheck1">Killed</label>
              </div>

              <div>
                <input
                  type="checkbox"
                  id="filterCheck2"
                  class="filterBox"
                  value="Alive"
                />
                <label for="filterCheck2">Alive</label>
              </div>

              <div>
                <input
                  type="checkbox"
                  id="filterCheck3"
                  class="filterBox"
                  value="Major"
                />
                <label for="filterCheck3">Major-Boss</label>
              </div>

              <div>
                <input
                  type="checkbox"
                  id="filterCheck4"
                  class="filterBox"
                  value="Progress"
                />
                <label for="filterCheck4">Progression-Boss</label>
              </div>
            </div>
            <div id="cardsContainer"></div>
          </div>
        </main>
      </main>
    </main>
  </body>
</html>
