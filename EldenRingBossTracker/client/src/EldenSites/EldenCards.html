<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EldenCards</title>

    <link href="../EldenCSS/tailwind.css" rel="stylesheet" />
    <link href="../EldenCSS/eldenStylesMain.css" rel="stylesheet" />

    <link
      rel="icon"
      type="image/png"
      href="../EldenPictures/GoldenOrderIcon.png"
    />
  </head>
  <body>
    <main id="eldenringCards-bg">
      <main id="CardsMainGrid">
        <div id="Header" class="bg-zinc-800">
          <div class="flex gap-3 content-center">
            <div id="headerImg1" class="w-7">
              <img src="../EldenPictures/Icons/MenuBars.png" alt="Menu Bars" />
            </div>

            <div id="headerImg2" class="w-64">
              <img
                src="../EldenPictures/Icons/search bar.png"
                alt="searchBar"
              />
            </div>
          </div>

          <div id="headerImg3" class="flex w-7 justify-end">
            <img
              src="../EldenPictures/Icons/optionDots.png"
              alt="Option Dots"
            />
          </div>
        </div>

        <div id="Main">
          <div
            class="text-yellow-700 font-bold font-sm bg-zinc-950 bg-opacity-50"
          >
            RADAHN HOLT SICH DIE STERNEEEEEE!!!
          </div>
        </div>
      </main>
    </main>
  </body>
</html>
