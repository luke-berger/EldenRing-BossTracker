<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer</title>

    <!-- Tailwind CSS -->
    <link href="../EldenCSS/tailwind.css" rel="stylesheet" />
    <link href="../EldenCSS/eldenStylesMain.css" rel="stylesheet" />

    <!-- Icon -->
    <link
      rel="icon"
      type="image/png"
      href="../EldenPictures/GoldenOrderIcon.png"
    />
  </head>
  <body>
    <!-- Hauptcontainer -->
    <main id="eldenringCards-bg" class="h-screen bg-cover bg-center text-white">
      <!-- Grid-Layout -->
      <div id="CardsMainGrid">
        <!-- Header -->
        <div id="Header" class="bg-zinc-800">
          <div id="headerImg1" class="w-7">
            <a href="./Developer.html">
              <img src="../EldenPictures/Icons/MenuBars.png" alt="Menu-Bars" />
            </a>
          </div>

          <div id="headerImg2" class="w-64">
            <img src="../EldenPictures/Icons/search bar.png" alt="Search-Bar" />
          </div>

          <a href="../../index.html">
            <button>Welcome</button>
          </a>

          <a href="../EldenSites/EldenCards.html">
            <button>BossTracker</button>
          </a>

          <a href="../EldenSites/EldenWiki.html">
            <button>EldenWiki</button>
          </a>

          <a href="./Developer.html">
            <button>Developers</button>
          </a>

          <div class="flex items-center ml-auto gap-4">
            <div id="headerImg3" class="w-7 ml-auto">
              <a href="./Developer.html">
                <img
                  src="../EldenPictures/Icons/optionDots.png"
                  alt="Option Dots"
                />
              </a>
            </div>

            <div id="headerImg4" class="w-7 ml-auto">
              <a href="./Developer.html">
                <img
                  src="../EldenPictures/Icons/accountIcon.png"
                  alt="Account-Icon"
                />
              </a>
            </div>
          </div>
        </div>

        <!-- Main Content -->
        <div id="Main">
          <div class="flex flex-col">
            <div class="text-white font-bold text-2xl pb-10">
              <p class="pb-2">DEVELOPERS</p>
              <div class="w-full">
                <img src="../EldenPictures/line.png" alt="Line" />
              </div>
            </div>
            <div id="theboys" class="flex justify-evenly items-center m-24">
              <div id="johannImgContainer" class="w-64">
                <div id="johannImg">
                  <img
                    class="rounded-lg"
                    src="../EldenPictures/devs/johann.jpg"
                    alt="Picture Of Dev-Johann"
                  />
                </div>

                <div id="devText">Johann Gutzke</div>
                <div class="text-center">
                  Medieninformatiker<br />johann.gutzke@student.uni-luebeck.de
                </div>
              </div>

              <div id="lukeImgContainer" class="w-64">
                <div id="lukeImg">
                  <img
                    class="rounded-lg"
                    src="../EldenPictures/devs/luke.jpg"
                    alt="Picture Of Dev-Luke"
                  />
                </div>

                <div id="devText">Luke Berger</div>
                <div class="text-center">
                  Medieninformatiker<br />luke.berger@student.uni-luebeck.de
                </div>
              </div>

              <div id="niclasImgContainer" class="flex flex-col w-64">
                <div id="niclasImg">
                  <img
                    class="rounded-lg"
                    src="../EldenPictures/devs/niclas.jpg"
                    alt="Picture Of Dev-Niclas"
                  />
                </div>

                <div id="devText">Niclas Prapavat</div>
                <div class="text-center">
                  Medieninformatiker<br />niclas.prapavat@student.uni-luebeck.de
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

</html>
